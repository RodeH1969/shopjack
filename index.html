<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopJack Locknload</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root {
      --bg1:#07224d;
      --bg2:#021226;
      --gold:#ffd978;
      --red:#d61e24;
      --green:#34c36b;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      color:#fff;
      background:radial-gradient(circle at 50% 10%, #0a3773 0%, var(--bg1) 40%, var(--bg2) 100%);
      overflow-x:hidden;
    }

    .wrap {
      width:min(100%,430px);
      margin:0 auto;
      min-height:100vh;
      padding:14px 10px 24px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      position:relative;
      z-index:1;
    }

    .game-meta {
      width:100%;
      text-align:center;
      line-height:1.15;
    }

    .game-no {
      font-size:13px;
      font-weight:800;
      color:rgba(255,255,255,.88);
    }

    .game-date {
      font-size:13px;
      font-weight:700;
      color:rgba(255,255,255,.74);
      margin-top:3px;
    }

    .hud {
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:900;
    }

    .target-label {
      font-size:22px;
    }

    .chip {
      width:82px;
      height:82px;
      border-radius:50%;
      background:var(--red);
      padding:7px;
      display:grid;
      place-items:center;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }

    .chip-inner {
      width:100%;
      height:100%;
      border-radius:50%;
      background:#fff;
      color:#111;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:28px;
      border:3px solid rgba(0,0,0,.08);
    }

    .tableau {
      width:100%;
      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:12px 10px;
      align-items:end;
      justify-items:center;
      padding-top:6px;
      padding-bottom:8px;
      position:relative;
      z-index:2;
    }

    .card-wrap {
      width:100%;
      max-width:96px;
      aspect-ratio:2.5/3.7;
      position:relative;
      transition:transform .5s ease, filter .4s ease, opacity .4s ease;
      z-index:2;
    }

    .card-wrap.pos1 { grid-column:1 / span 2; }
    .card-wrap.pos2 { grid-column:3 / span 2; }
    .card-wrap.pos3 { grid-column:5 / span 2; }
    .card-wrap.pos4 { grid-column:2 / span 2; }
    .card-wrap.pos5 { grid-column:4 / span 2; }

    .card-wrap.locked {
      transform:translateY(-22px) scale(1.03);
      z-index:5;
      filter:drop-shadow(0 14px 18px rgba(0,0,0,.42));
    }

    .card-wrap.scored:not(.locked) {
      transform:translateY(10px) scale(.98);
      opacity:.92;
    }

    .tick {
      position:absolute;
      top:-12px;
      left:50%;
      transform:translateX(-50%);
      width:28px;
      height:28px;
      border-radius:50%;
      border:2px solid #fff;
      background:rgba(4,17,41,.95);
      color:#fff;
      font-weight:900;
      font-size:16px;
      z-index:9;
      display:grid;
      place-items:center;
      box-shadow:0 5px 14px rgba(0,0,0,.28);
      cursor:pointer;
      padding:0;
    }

    .card-wrap.chosen .tick {
      background:var(--green);
      color:#03210f;
      border-color:#c7ffd8;
    }

    .card {
      width:100%;
      height:100%;
      position:relative;
      filter:drop-shadow(0 9px 10px rgba(0,0,0,.28));
    }

    .card-face {
      position:absolute;
      inset:0;
      border-radius:14px;
      overflow:hidden;
      border:2px solid rgba(255,255,255,.9);
      background:#fff;
      transition:opacity .35s ease;
    }

    .card-face.back {
      opacity:1;
      z-index:2;
    }

    .card-face.front {
      opacity:0;
      z-index:1;
    }

    .show-face .card-face.back {
      opacity:0;
    }

    .show-face .card-face.front {
      opacity:1;
    }

    .card-face.back img,
    .card-face.front img {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .price-badge {
      position:absolute;
      left:50%;
      bottom:8px;
      transform:translateX(-50%);
      min-width:56px;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(0,0,0,.84);
      color:#fff;
      text-align:center;
      font-weight:900;
      font-size:14px;
      z-index:8;
      opacity:0;
      pointer-events:none;
      transition:opacity .35s ease, transform .35s ease;
      border:2px solid rgba(255,255,255,.88);
      line-height:1;
    }

    .price-on .price-badge {
      opacity:1;
      transform:translateX(-50%) translateY(-1px);
    }

    .controls {
      display:flex;
      gap:10px;
      justify-content:center;
      width:100%;
      flex-wrap:wrap;
    }

    .btn {
      border:0;
      border-radius:999px;
      padding:11px 18px;
      font-weight:900;
      font-size:16px;
      box-shadow:0 8px 22px rgba(0,0,0,.28);
      cursor:pointer;
    }

    .btn-primary {
      background:var(--gold);
      color:#172033;
    }

    .btn-secondary {
      background:#fff;
      color:#041a3c;
    }

    .btn-share {
      background:#e9f3ff;
      color:#062a54;
      display:none;
    }

    .scoreboard {
      width:100%;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.18);
      border-radius:18px;
      padding:14px 14px;
      display:grid;
      gap:6px;
      text-align:center;
    }

    .scoreboard .line1 { font-size:16px; font-weight:800; }
    .scoreboard .line2 { font-size:26px; font-weight:900; }
    .scoreboard .line3 { font-size:19px; font-weight:900; color:#ffe08f; }
    .scoreboard .line4 { font-size:13px; color:rgba(255,255,255,.8); }

    .bust-overlay {
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      pointer-events:none;
      opacity:0;
      z-index:99999;
      background:radial-gradient(circle, rgba(255,45,45,.18) 0%, rgba(0,0,0,.08) 40%, rgba(0,0,0,0) 72%);
    }

    .bust-overlay.show {
      animation:bustFlash 1.7s ease forwards;
    }

    .bust-center {
      transform:translateY(-60px);
      display:grid;
      place-items:center;
      position:relative;
    }

    .bust-text {
      font-size:24vw;
      font-weight:900;
      color:#fff;
      letter-spacing:.08em;
      text-shadow:
        0 0 10px rgba(255,255,255,.55),
        0 0 25px rgba(255,0,0,.85),
        0 0 60px rgba(255,0,0,.95);
      transform:scale(.2) rotate(-8deg);
      opacity:0;
      position:relative;
      z-index:2;
    }

    .bust-overlay.show .bust-text {
      animation:bustPop 1.5s cubic-bezier(.12,.78,.22,1) forwards;
    }

    .burst, .burst::before, .burst::after {
      position:absolute;
      content:"";
      width:220px;
      height:220px;
      border-radius:50%;
      border:8px solid rgba(255,60,60,.55);
    }

    .burst {
      transform:scale(.2);
      opacity:0;
      z-index:1;
    }

    .bust-overlay.show .burst {
      animation:ringBoom 1.2s ease-out forwards;
    }

    .burst::before { inset:-24px; }
    .burst::after  { inset:24px; }

    @keyframes bustFlash {
      0% { opacity:0; }
      10% { opacity:1; }
      85% { opacity:1; }
      100% { opacity:0; }
    }

    @keyframes bustPop {
      0% { transform:scale(.15) rotate(-12deg); opacity:0; }
      18% { transform:scale(1.25) rotate(3deg); opacity:1; }
      32% { transform:scale(.92) rotate(-2deg); opacity:1; }
      48% { transform:scale(1.12) rotate(1deg); opacity:1; }
      100% { transform:scale(1) rotate(0); opacity:1; }
    }

    @keyframes ringBoom {
      0% { transform:scale(.1); opacity:0; }
      20% { opacity:1; }
      100% { transform:scale(2.2); opacity:0; }
    }

    @media (max-width:360px) {
      .wrap { padding-left:8px; padding-right:8px; }
      .tableau { gap:10px 8px; }
      .card-wrap { max-width:88px; }
      .target-label { font-size:20px; }
      .chip { width:76px; height:76px; }
      .chip-inner { font-size:25px; }
      .btn { font-size:15px; padding:10px 14px; }
      .scoreboard .line2 { font-size:23px; }
      .bust-center { transform:translateY(-42px); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="game-meta">
      <div class="game-no">Game #213</div>
      <div class="game-date">5th May 2026</div>
    </div>

    <div class="hud">
      <div class="target-label">Today's Target =</div>
      <div class="chip"><div class="chip-inner">$21</div></div>
    </div>

    <section class="tableau">
      <div class="card-wrap pos1" data-price="4.00">
        <button class="tick" type="button">✓</button>
        <div class="card">
          <div class="card-face back">
            <img src="facecard.jpeg" alt="ShopJack card back">
          </div>
          <div class="card-face front">
            <img src="cards/cadbury-card.png" alt="Cadbury card">
          </div>
        </div>
        <div class="price-badge">$4.00</div>
      </div>

      <div class="card-wrap pos2" data-price="8.99">
        <button class="tick" type="button">✓</button>
        <div class="card">
          <div class="card-face back">
            <img src="facecard.jpeg" alt="ShopJack card back">
          </div>
          <div class="card-face front">
            <img src="cards/emporiumgoats-card.png" alt="Emporium goat's cheese card">
          </div>
        </div>
        <div class="price-badge">$8.99</div>
      </div>

      <div class="card-wrap pos3" data-price="4.99">
        <button class="tick" type="button">✓</button>
        <div class="card">
          <div class="card-face back">
            <img src="facecard.jpeg" alt="ShopJack card back">
          </div>
          <div class="card-face front">
            <img src="cards/halloumi-card.png" alt="Halloumi card">
          </div>
        </div>
        <div class="price-badge">$4.99</div>
      </div>

      <div class="card-wrap pos4" data-price="7.20">
        <button class="tick" type="button">✓</button>
        <div class="card">
          <div class="card-face back">
            <img src="facecard.jpeg" alt="ShopJack card back">
          </div>
          <div class="card-face front">
            <img src="cards/cocopops-card.png" alt="Coco Pops card">
          </div>
        </div>
        <div class="price-badge">$7.20</div>
      </div>

      <div class="card-wrap pos5" data-price="4.50">
        <button class="tick" type="button">✓</button>
        <div class="card">
          <div class="card-face back">
            <img src="facecard.jpeg" alt="ShopJack card back">
          </div>
          <div class="card-face front">
            <img src="cards/nutrigrain-card.png" alt="Nutri-Grain card">
          </div>
        </div>
        <div class="price-badge">$4.50</div>
      </div>
    </section>

    <div class="controls">
      <button class="btn btn-secondary" id="flipBtn" type="button">Flip cards</button>
      <button class="btn btn-primary" id="lockBtn" type="button">Locknload</button>
      <button class="btn btn-secondary" id="resetBtn" type="button">1 do over</button>
      <button class="btn btn-share" id="shareBtn" type="button">Share</button>
    </div>

    <section class="scoreboard" aria-live="polite">
      <div class="line1" id="statusText">Flip the cards, tick your picks, then Locknload.</div>
      <div class="line2" id="totalText">Locked total: $0.00</div>
      <div class="line3" id="scoreText">Score: 0 points</div>
      <div class="line4" id="shareHint">Share appears after you finish, or after your 1 do over is gone.</div>
    </section>
  </main>

  <div class="bust-overlay" id="bustOverlay">
    <div class="bust-center">
      <div class="burst"></div>
      <div class="bust-text">BUST</div>
    </div>
  </div>

  <script>
    const target = 21;
    const gameNumber = 213;
    const gameDate = '5th May 2026';

    const cards = [...document.querySelectorAll('.card-wrap')];
    const flipBtn = document.getElementById('flipBtn');
    const lockBtn = document.getElementById('lockBtn');
    const resetBtn = document.getElementById('resetBtn');
    const shareBtn = document.getElementById('shareBtn');
    const statusText = document.getElementById('statusText');
    const totalText = document.getElementById('totalText');
    const scoreText = document.getElementById('scoreText');
    const shareHint = document.getElementById('shareHint');
    const bustOverlay = document.getElementById('bustOverlay');

    let facesVisible = false;
    let scored = false;
    let doOverUsed = false;
    let lastTotal = 0;
    let lastPoints = 0;

    cards.forEach(card => {
      card.querySelector('.tick').addEventListener('click', () => {
        if (!facesVisible || scored) return;
        card.classList.toggle('chosen');
      });
    });

    function showShareButton() {
      shareBtn.style.display = 'inline-block';
      shareHint.textContent = 'Share your result.';
    }

    function resultEmoji(points) {
      if (points === 500) return '🏆';
      if (points === 100) return '🍾';
      if (points === 50) return '💐';
      if (points === 10) return '👍';
      return '👋';
    }

    function buildShareText() {
      const emoji = resultEmoji(lastPoints);
      return [
        `ShopJack Game #${gameNumber}`,
        `${gameDate}`,
        `Target: $${target}`,
        `My total: $${lastTotal.toFixed(2)}`,
        `Points: ${lastPoints} ${emoji}`
      ].join('\n');
    }

    async function shareResult() {
      const text = buildShareText();

      if (navigator.share) {
        try {
          await navigator.share({
            title: `ShopJack Game #${gameNumber}`,
            text
          });
          return;
        } catch (err) {}
      }

      try {
        await navigator.clipboard.writeText(text);
        shareBtn.textContent = 'Copied!';
        setTimeout(() => {
          shareBtn.textContent = 'Share';
        }, 1400);
      } catch (err) {
        alert(text);
      }
    }

    shareBtn.addEventListener('click', shareResult);

    flipBtn.addEventListener('click', () => {
      if (scored || facesVisible) return;
      facesVisible = true;
      cards.forEach(card => card.classList.add('show-face'));
      flipBtn.style.display = 'none';
      statusText.textContent = 'Now tick the cards you want to keep in.';
    });

    function scoreFor(total) {
      if (total > target) return { score: 0, label: 'BUST!' };
      const diff = +(Math.abs(target - total).toFixed(2));
      if (diff === 0) return { score: 500, label: 'Exact hit!' };
      if (diff <= 2) return { score: 100, label: 'Within $2' };
      if (diff <= 5) return { score: 50, label: 'Within $5' };
      if (diff <= 10) return { score: 10, label: 'Within $10' };
      return { score: 0, label: '0 points' };
    }

    function triggerBust() {
      bustOverlay.classList.remove('show');
      void bustOverlay.offsetWidth;
      bustOverlay.classList.add('show');
    }

    lockBtn.addEventListener('click', () => {
      if (scored || !facesVisible) return;
      scored = true;

      cards.forEach(card => {
        card.classList.add('show-face', 'price-on', 'scored');
        if (card.classList.contains('chosen')) {
          card.classList.add('locked');
        }
      });

      let total = 0;
      let selectedCount = 0;
      cards.forEach(card => {
        if (card.classList.contains('chosen')) {
          total += Number(card.dataset.price);
          selectedCount += 1;
        }
      });

      total = +total.toFixed(2);
      const result = scoreFor(total);
      lastTotal = total;
      lastPoints = result.score;

      totalText.textContent = `Locked total: $${total.toFixed(2)}`;
      scoreText.textContent = `Score: ${result.score} points`;

      if (selectedCount === 0) {
        statusText.textContent = 'No cards ticked. 0 points.';
      } else if (total > target) {
        statusText.textContent = `BUST! Locked cards went over $${target}.`;
        triggerBust();
      } else {
        statusText.textContent =
          `${result.label} with ${selectedCount} locked card` +
          (selectedCount === 1 ? '' : 's') + '.';
      }

      if (doOverUsed) {
        showShareButton();
      } else {
        shareHint.textContent = 'Use your 1 do over, or share this result now if you are done.';
        shareBtn.style.display = 'inline-block';
      }
    });

    resetBtn.addEventListener('click', () => {
      if (doOverUsed) return;
      doOverUsed = true;

      facesVisible = false;
      scored = false;
      lastTotal = 0;
      lastPoints = 0;

      cards.forEach(card =>
        card.classList.remove('chosen', 'show-face', 'price-on', 'scored', 'locked')
      );

      totalText.textContent = 'Locked total: $0.00';
      scoreText.textContent = 'Score: 0 points';
      statusText.textContent = 'Do over used. Flip the cards again, then pick your locks.';
      shareHint.textContent = 'Your do over is gone. Share will appear after this round.';
      bustOverlay.classList.remove('show');

      flipBtn.style.display = 'inline-block';
      resetBtn.style.display = 'none';
      shareBtn.style.display = 'none';
    });
  </script>
</body>
</html>
